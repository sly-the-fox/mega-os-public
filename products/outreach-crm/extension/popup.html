<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #eee;
      margin: 0;
    }
    h2 {
      margin: 0 0 4px 0;
      font-size: 1em;
      color: #4a9eff;
    }
    p {
      margin: 0 0 16px 0;
      font-size: 0.8em;
      color: #888;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #77b8ff; }
    button:disabled { background: #333; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      font-size: 0.85em;
      text-align: center;
      min-height: 20px;
      color: #888;
    }
    #notLinkedIn {
      display: none;
      padding: 12px;
      background: #2a1a0a;
      border: 1px solid #ff9800;
      border-radius: 6px;
      font-size: 0.85em;
      color: #ff9800;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Outreach Capture</h2>
  <p>LinkedIn Profile Capture</p>

  <div id="mainContent">
    <button id="captureBtn">Capture Profile</button>
    <div id="status"></div>
  </div>

  <div id="notLinkedIn">
    Navigate to a LinkedIn profile page first.<br>
    (linkedin.com/in/...)
  </div>

  <script src="popup.js"></script>
</body>
</html>
